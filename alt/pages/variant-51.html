<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Instantaneous tick stage · Derivative Duel alt 51</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #111111;
      --muted: #5c5c5c;
      --line: #d6d6d6;
      --paper: #f7f7f5;
      --surface: #ffffff;
      --accent: #1a1a1a;
      --soft: #ecece8;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      color: var(--ink);
      background: var(--paper);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button {
      font: inherit;
      cursor: pointer;
      border: none;
      background: none;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1.35rem;
      background: var(--ink);
      color: #fff;
      border-radius: 4px;
      transition: transform 180ms ease, background 180ms ease;
    }
    .cta:hover { transform: translateY(-1px); background: #000; }
    .cta-ghost {
      display: inline-flex;
      align-items: center;
      padding: 0.85rem 1.2rem;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--ink);
      background: transparent;
      transition: border-color 180ms ease, background 180ms ease;
    }
    .cta-ghost:hover { border-color: var(--ink); background: rgba(0,0,0,0.02); }
    .brand-mark {
      font-size: 1.75rem;
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
    }
    .nav-links { display: flex; gap: 1.25rem; font-size: 0.9rem; color: var(--muted); }
    .nav-links a:hover { color: var(--ink); }
    .eq {
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes draw {
      from { stroke-dashoffset: 120; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulseSoft {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }
    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(-8px); }
    }
    .anim-rise { animation: rise 700ms ease both; }
    .anim-rise-2 { animation: rise 800ms 120ms ease both; }
    .anim-rise-3 { animation: rise 900ms 220ms ease both; }
    .anim-fade { animation: fade 900ms ease both; }
    
    body { font-family: 'IBM Plex Mono', monospace; background: #f5f5f2; }
    .stage { min-height: 100vh; display: flex; flex-direction: column; }
    .top { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 1.5rem 2rem; max-width: 720px; }
    .brand {
      font-family: 'Space Grotesk', sans-serif; font-weight: 700;
      font-size: clamp(2.8rem, 7vw, 4.4rem); letter-spacing: -0.045em;
      margin: 0 0 0.75rem; line-height: 0.95;
    }
    .lead { color: var(--muted); font-size: 0.92rem; line-height: 1.65; margin: 0 0 1.75rem; max-width: 30rem; }
    .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .ticks {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 0.35rem; padding: 0 1.5rem 2.5rem; height: 140px;
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, #ecece6, #f5f5f2);
    }
    .ticks i {
      display: block; width: 2px; background: #222; opacity: 0.35;
      transform-origin: bottom; animation: rise 700ms ease both, drift 3.5s ease-in-out infinite alternate;
    }
    .ticks i:nth-child(odd) { height: 40%; }
    .ticks i:nth-child(3n) { height: 70%; opacity: 0.55; }
    .ticks i:nth-child(5n) { height: 95%; opacity: 0.85; animation-delay: 80ms, 0s; }
  
  </style>
</head>
<body data-variant="51" data-motion="rise+fade+drift">

    <div class="stage">
      <nav class="nav anim-fade">
        <div class="brand-mark">∂ Derivative Duel</div>
        <div class="nav-links"><a href="#">rules</a><a href="#">login</a></div>
      </nav>
      <div class="top">
        <h1 class="brand anim-rise">Derivative Duel</h1>
        <p class="lead anim-rise-2">The slope at a single instant. Read it cleanly, submit, and take the round.</p>
        <div class="actions anim-rise-3">
          <a class="cta" href="#">Play random</a>
          <a class="cta-ghost" href="#">View leaderboard</a>
        </div>
      </div>
      <div class="ticks anim-fade" aria-hidden="true">
        <i style="animation-delay:0ms,0s"></i><i style="animation-delay:30ms,0.15s"></i><i style="animation-delay:60ms,0.3s"></i><i style="animation-delay:90ms,0.44999999999999996s"></i><i style="animation-delay:120ms,0.6s"></i><i style="animation-delay:150ms,0s"></i><i style="animation-delay:180ms,0.15s"></i><i style="animation-delay:210ms,0.3s"></i><i style="animation-delay:240ms,0.44999999999999996s"></i><i style="animation-delay:270ms,0.6s"></i><i style="animation-delay:300ms,0s"></i><i style="animation-delay:330ms,0.15s"></i><i style="animation-delay:360ms,0.3s"></i><i style="animation-delay:390ms,0.44999999999999996s"></i><i style="animation-delay:420ms,0.6s"></i><i style="animation-delay:450ms,0s"></i><i style="animation-delay:480ms,0.15s"></i><i style="animation-delay:510ms,0.3s"></i><i style="animation-delay:540ms,0.44999999999999996s"></i><i style="animation-delay:570ms,0.6s"></i><i style="animation-delay:600ms,0s"></i><i style="animation-delay:630ms,0.15s"></i><i style="animation-delay:660ms,0.3s"></i><i style="animation-delay:690ms,0.44999999999999996s"></i><i style="animation-delay:720ms,0.6s"></i><i style="animation-delay:750ms,0s"></i><i style="animation-delay:780ms,0.15s"></i><i style="animation-delay:810ms,0.3s"></i>
      </div>
    </div>
  
</body>
</html>
