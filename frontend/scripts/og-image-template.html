<!doctype html>
<!-- Template for generating public/og-image.png (1200x630 screenshot). -->
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: 1200px;
        height: 630px;
        background: #f9fafb;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        text-align: center;
      }
      .symbol {
        font-family: 'Times New Roman', serif;
        font-style: italic;
        font-size: 160px;
        color: #111827;
        line-height: 1;
      }
      h1 {
        margin-top: 24px;
        font-size: 72px;
        font-weight: 700;
        color: #111827;
        letter-spacing: -1px;
      }
      p {
        margin-top: 20px;
        font-size: 32px;
        color: #4b5563;
      }
      .url {
        margin-top: 40px;
        font-size: 26px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="symbol">&#8706;</div>
      <h1>derivative duel</h1>
      <p>Competitive 1v1 calculus battles. Solve derivatives, climb the ELO ladder.</p>
      <div class="url">www.mathbattle.xyz</div>
    </div>
  </body>
</html>
